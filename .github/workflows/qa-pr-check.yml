name: QA Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
    branches:
      - qa

permissions:
  contents: read

concurrency:
  group: qa-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  qa-checks:
    name: QA Checks
    runs-on: ubuntu-latest

    steps:
      - name: Validate QA PR source branch
        run: |
          echo "Source branch: ${{ github.head_ref }}"
          echo "Target branch: ${{ github.base_ref }}"

          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "ERROR: Pull requests into qa must come from dev."
            exit 1
          fi

          echo "Valid QA promotion: dev -> qa"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node if package.json exists
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and test Node backend
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          npm ci
          npm test --if-present
          npm run build --if-present

      - name: Set up Python if requirements.txt exists
        if: ${{ hashFiles('requirements.txt') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test Python backend
        if: ${{ hashFiles('requirements.txt') != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          if [ -d "tests" ]; then
            pytest
          else
            echo "No tests directory found. Skipping pytest."
          fi

      - name: Build Docker image if Dockerfile exists
        if: ${{ hashFiles('Dockerfile') != '' }}
        run: |
          docker build -t backend-core-qa-check .

      - name: QA checks completed
        run: |
          echo "QA pull request checks completed successfully."