name: Docker build and test

on:
  schedule:
    - cron: '34 10 * * *'
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  # Image name (local tag). Uses <owner>/<repo> by default.
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: test

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image from repo root Dockerfile and load locally
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Test run built image
        run: |
          set -euo pipefail
          IMAGE="${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          CONTAINER_NAME="gh-actions-test-container"

          # Ensure no leftover container with the same name
          if docker ps -a --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
            docker rm -f "${CONTAINER_NAME}" || true
          fi

          # Try to start the container detached
          echo "Running container from image: ${IMAGE}"
          CONTAINER_ID=$(docker run -d --name "${CONTAINER_NAME}" "${IMAGE}" || true)

          if [ -n "${CONTAINER_ID}" ]; then
            echo "Container created: ${CONTAINER_ID}"
            # Give the container a moment to initialize
            sleep 3

            # If the container is still running, stop it gracefully
            if docker ps --filter "id=${CONTAINER_ID}" --format '{{.ID}}' | grep -q .; then
              echo "Container is running; stopping now."
              docker stop "${CONTAINER_ID}"
              docker rm "${CONTAINER_ID}"
            else
              # Container exited quickly; show logs and fail the job
              echo "Container exited immediately. Showing logs:"
              docker logs "${CONTAINER_ID}" || true
              docker rm "${CONTAINER_ID}"
              echo "Test run failed: container exited with non-zero or did not stay running."
              exit 1
            fi

            echo "Test run succeeded."
          else
            echo "docker run did not create a container for image ${IMAGE}."
            exit 1
          fi
